spring:
  datasource:
    url: jdbc:h2:mem:cuenta_movimiento_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          lob:
            non_contextual_creation: true
client:
  persona:
    base-url: http://127.0.0.1:19090
server:
  port: 0
logging:
  level:
    org.springframework: WARN
