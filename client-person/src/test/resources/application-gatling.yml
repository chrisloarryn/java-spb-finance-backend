spring:
  datasource:
    url: jdbc:h2:mem:client_person_gatling;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          lob:
            non_contextual_creation: true
  mvc:
    servlet:
      load-on-startup: 1
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
server:
  port: 1203
logging:
  level:
    root: WARN
    org.springframework: WARN
    web: WARN
debug: false
