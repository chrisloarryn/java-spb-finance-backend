            cuenta-movimiento/target/coverage.log
          if-no-files-found: ignore

      - name: Fail if cuenta-movimiento coverage gate failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  validation-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - cliente-persona-unit-tests
      - cliente-persona-karate-contract-tests
      - cliente-persona-gatling-performance-tests
      - cliente-persona-coverage-quality-gate
      - cuenta-movimiento-unit-tests
      - cuenta-movimiento-karate-contract-tests
      - cuenta-movimiento-gatling-performance-tests
      - cuenta-movimiento-coverage-quality-gate
    steps:
      - name: Publish workflow summary
        env:
          CLIENTE_PERSONA_UNIT_RESULT: ${{ needs.cliente-persona-unit-tests.result }}
          CLIENTE_PERSONA_UNIT_TESTS_RUN: ${{ needs.cliente-persona-unit-tests.outputs.tests_run }}
          CLIENTE_PERSONA_UNIT_FAILURES: ${{ needs.cliente-persona-unit-tests.outputs.failures }}
          CLIENTE_PERSONA_UNIT_ERRORS: ${{ needs.cliente-persona-unit-tests.outputs.errors }}
          CLIENTE_PERSONA_UNIT_SKIPPED: ${{ needs.cliente-persona-unit-tests.outputs.skipped }}
          CLIENTE_PERSONA_UNIT_SERVICE_TESTS: ${{ needs.cliente-persona-unit-tests.outputs.service_tests }}
