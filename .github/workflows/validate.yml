name: Validate Java Finance Services

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  cliente-persona-unit-tests:
    runs-on: ubuntu-latest
    outputs:
      tests_run: ${{ steps.publish-summary.outputs.tests_run }}
      failures: ${{ steps.publish-summary.outputs.failures }}
      errors: ${{ steps.publish-summary.outputs.errors }}
      skipped: ${{ steps.publish-summary.outputs.skipped }}
      duration_seconds: ${{ steps.publish-summary.outputs.duration_seconds }}
      service_tests: ${{ steps.publish-summary.outputs.service_tests }}
      security_tests: ${{ steps.publish-summary.outputs.security_tests }}
      repository_tests: ${{ steps.publish-summary.outputs.repository_tests }}
      integration_tests: ${{ steps.publish-summary.outputs.integration_tests }}
      error_tests: ${{ steps.publish-summary.outputs.error_tests }}
      other_tests: ${{ steps.publish-summary.outputs.other_tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run cliente-persona unit and integration tests excluding Karate
        id: run-tests
        continue-on-error: true
        working-directory: cliente-persona
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode clean test -DexcludedGroups=karate 2>&1 | tee target/unit-tests.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish cliente-persona unit summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py unit \
            --module-label "cliente-persona" \
            --reports-dir cliente-persona/target/surefire-reports \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload cliente-persona unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cliente-persona-unit-test-report
          path: |
            cliente-persona/target/surefire-reports
            cliente-persona/target/unit-tests.log
          if-no-files-found: ignore

      - name: Fail if cliente-persona unit tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  cliente-persona-karate-contract-tests:
    runs-on: ubuntu-latest
    needs: cliente-persona-unit-tests
    outputs:
      features_total: ${{ steps.publish-summary.outputs.features_total }}
      features_passed: ${{ steps.publish-summary.outputs.features_passed }}
      features_failed: ${{ steps.publish-summary.outputs.features_failed }}
      scenarios_total: ${{ steps.publish-summary.outputs.scenarios_total }}
      scenarios_passed: ${{ steps.publish-summary.outputs.scenarios_passed }}
      scenarios_failed: ${{ steps.publish-summary.outputs.scenarios_failed }}
      elapsed_seconds: ${{ steps.publish-summary.outputs.elapsed_seconds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run cliente-persona Karate contract tests
        id: run-tests
        continue-on-error: true
        working-directory: cliente-persona
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Dtest=karate.ApiContractsKarateTest test 2>&1 | tee target/karate-console.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish cliente-persona Karate summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py karate \
            --module-label "cliente-persona" \
            --summary-json cliente-persona/target/karate-reports/karate-summary-json.txt \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload cliente-persona Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cliente-persona-karate-report
          path: |
            cliente-persona/target/karate-reports
            cliente-persona/target/karate-console.log
          if-no-files-found: ignore

      - name: Fail if cliente-persona Karate tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  cliente-persona-gatling-performance-tests:
    runs-on: ubuntu-latest
    needs: cliente-persona-unit-tests
    outputs:
      requests_total: ${{ steps.publish-summary.outputs.requests_total }}
      requests_ok: ${{ steps.publish-summary.outputs.requests_ok }}
      requests_ko: ${{ steps.publish-summary.outputs.requests_ko }}
      mean_response_ms: ${{ steps.publish-summary.outputs.mean_response_ms }}
      p95_ms: ${{ steps.publish-summary.outputs.p95_ms }}
      p99_ms: ${{ steps.publish-summary.outputs.p99_ms }}
      throughput_rps: ${{ steps.publish-summary.outputs.throughput_rps }}
      assertions_total: ${{ steps.publish-summary.outputs.assertions_total }}
      assertions_failed: ${{ steps.publish-summary.outputs.assertions_failed }}
      report_path: ${{ steps.publish-summary.outputs.report_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run cliente-persona Gatling performance tests
        id: run-tests
        continue-on-error: true
        working-directory: cliente-persona
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Pgatling verify -DskipTests=true 2>&1 | tee target/gatling-console.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish cliente-persona Gatling summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py gatling \
            --module-label "cliente-persona" \
            --console-log cliente-persona/target/gatling-console.log \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload cliente-persona Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cliente-persona-gatling-report
          path: |
            cliente-persona/target/gatling
            cliente-persona/target/gatling-console.log
          if-no-files-found: ignore

      - name: Fail if cliente-persona Gatling tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  cliente-persona-coverage-quality-gate:
    runs-on: ubuntu-latest
    needs: cliente-persona-unit-tests
    outputs:
      line_coverage_pct: ${{ steps.publish-summary.outputs.line_coverage_pct }}
      covered_lines: ${{ steps.publish-summary.outputs.covered_lines }}
      missed_lines: ${{ steps.publish-summary.outputs.missed_lines }}
      coverage_threshold_pct: ${{ steps.publish-summary.outputs.coverage_threshold_pct }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run cliente-persona coverage quality gate
        id: run-tests
        continue-on-error: true
        working-directory: cliente-persona
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Pcoverage verify -DexcludedGroups=karate 2>&1 | tee target/coverage.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish cliente-persona coverage summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py coverage \
            --module-label "cliente-persona" \
            --report-xml cliente-persona/target/site/jacoco/jacoco.xml \
            --minimum-ratio 0.90 \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload cliente-persona coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cliente-persona-coverage-report
          path: |
            cliente-persona/target/site/jacoco
            cliente-persona/target/coverage.log
          if-no-files-found: ignore

      - name: Fail if cliente-persona coverage gate failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  cuenta-movimiento-unit-tests:
    runs-on: ubuntu-latest
    outputs:
      tests_run: ${{ steps.publish-summary.outputs.tests_run }}
      failures: ${{ steps.publish-summary.outputs.failures }}
      errors: ${{ steps.publish-summary.outputs.errors }}
      skipped: ${{ steps.publish-summary.outputs.skipped }}
      duration_seconds: ${{ steps.publish-summary.outputs.duration_seconds }}
      service_tests: ${{ steps.publish-summary.outputs.service_tests }}
      security_tests: ${{ steps.publish-summary.outputs.security_tests }}
      repository_tests: ${{ steps.publish-summary.outputs.repository_tests }}
      integration_tests: ${{ steps.publish-summary.outputs.integration_tests }}
      error_tests: ${{ steps.publish-summary.outputs.error_tests }}
      other_tests: ${{ steps.publish-summary.outputs.other_tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
