        run: exit 1

  cuenta-movimiento-coverage-quality-gate:
    runs-on: ubuntu-latest
    needs: cuenta-movimiento-unit-tests
    outputs:
      line_coverage_pct: ${{ steps.publish-summary.outputs.line_coverage_pct }}
      covered_lines: ${{ steps.publish-summary.outputs.covered_lines }}
      missed_lines: ${{ steps.publish-summary.outputs.missed_lines }}
      coverage_threshold_pct: ${{ steps.publish-summary.outputs.coverage_threshold_pct }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run cuenta-movimiento coverage quality gate
