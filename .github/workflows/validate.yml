          CLIENTE_PERSONA_GATLING_P95: ${{ needs.cliente-persona-gatling-performance-tests.outputs.p95_ms }}
          CLIENTE_PERSONA_GATLING_P99: ${{ needs.cliente-persona-gatling-performance-tests.outputs.p99_ms }}
          CLIENTE_PERSONA_GATLING_THROUGHPUT: ${{ needs.cliente-persona-gatling-performance-tests.outputs.throughput_rps }}
          CLIENTE_PERSONA_GATLING_ASSERTIONS_FAILED: ${{ needs.cliente-persona-gatling-performance-tests.outputs.assertions_failed }}
          CLIENTE_PERSONA_COVERAGE_RESULT: ${{ needs.cliente-persona-coverage-quality-gate.result }}
          CLIENTE_PERSONA_COVERAGE_PCT: ${{ needs.cliente-persona-coverage-quality-gate.outputs.line_coverage_pct }}
          CLIENTE_PERSONA_COVERAGE_THRESHOLD_PCT: ${{ needs.cliente-persona-coverage-quality-gate.outputs.coverage_threshold_pct }}
          CLIENTE_PERSONA_COVERAGE_COVERED_LINES: ${{ needs.cliente-persona-coverage-quality-gate.outputs.covered_lines }}
          CLIENTE_PERSONA_COVERAGE_MISSED_LINES: ${{ needs.cliente-persona-coverage-quality-gate.outputs.missed_lines }}
          CUENTA_MOVIMIENTO_UNIT_RESULT: ${{ needs.cuenta-movimiento-unit-tests.result }}
          CUENTA_MOVIMIENTO_UNIT_TESTS_RUN: ${{ needs.cuenta-movimiento-unit-tests.outputs.tests_run }}
          CUENTA_MOVIMIENTO_UNIT_FAILURES: ${{ needs.cuenta-movimiento-unit-tests.outputs.failures }}
          CUENTA_MOVIMIENTO_UNIT_ERRORS: ${{ needs.cuenta-movimiento-unit-tests.outputs.errors }}
          CUENTA_MOVIMIENTO_UNIT_SKIPPED: ${{ needs.cuenta-movimiento-unit-tests.outputs.skipped }}
          CUENTA_MOVIMIENTO_UNIT_SERVICE_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.service_tests }}
          CUENTA_MOVIMIENTO_UNIT_SECURITY_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.security_tests }}
          CUENTA_MOVIMIENTO_UNIT_REPOSITORY_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.repository_tests }}
          CUENTA_MOVIMIENTO_UNIT_INTEGRATION_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.integration_tests }}
          CUENTA_MOVIMIENTO_UNIT_ERROR_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.error_tests }}
          CUENTA_MOVIMIENTO_UNIT_OTHER_TESTS: ${{ needs.cuenta-movimiento-unit-tests.outputs.other_tests }}
          CUENTA_MOVIMIENTO_KARATE_RESULT: ${{ needs.cuenta-movimiento-karate-contract-tests.result }}
          CUENTA_MOVIMIENTO_KARATE_FEATURES: ${{ needs.cuenta-movimiento-karate-contract-tests.outputs.features_total }}
          CUENTA_MOVIMIENTO_KARATE_SCENARIOS: ${{ needs.cuenta-movimiento-karate-contract-tests.outputs.scenarios_total }}
          CUENTA_MOVIMIENTO_KARATE_FAILED: ${{ needs.cuenta-movimiento-karate-contract-tests.outputs.scenarios_failed }}
          CUENTA_MOVIMIENTO_GATLING_RESULT: ${{ needs.cuenta-movimiento-gatling-performance-tests.result }}
          CUENTA_MOVIMIENTO_GATLING_REQUESTS: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.requests_total }}
          CUENTA_MOVIMIENTO_GATLING_KO: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.requests_ko }}
          CUENTA_MOVIMIENTO_GATLING_P95: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.p95_ms }}
          CUENTA_MOVIMIENTO_GATLING_P99: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.p99_ms }}
          CUENTA_MOVIMIENTO_GATLING_THROUGHPUT: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.throughput_rps }}
          CUENTA_MOVIMIENTO_GATLING_ASSERTIONS_FAILED: ${{ needs.cuenta-movimiento-gatling-performance-tests.outputs.assertions_failed }}
          CUENTA_MOVIMIENTO_COVERAGE_RESULT: ${{ needs.cuenta-movimiento-coverage-quality-gate.result }}
          CUENTA_MOVIMIENTO_COVERAGE_PCT: ${{ needs.cuenta-movimiento-coverage-quality-gate.outputs.line_coverage_pct }}
          CUENTA_MOVIMIENTO_COVERAGE_THRESHOLD_PCT: ${{ needs.cuenta-movimiento-coverage-quality-gate.outputs.coverage_threshold_pct }}
          CUENTA_MOVIMIENTO_COVERAGE_COVERED_LINES: ${{ needs.cuenta-movimiento-coverage-quality-gate.outputs.covered_lines }}
          CUENTA_MOVIMIENTO_COVERAGE_MISSED_LINES: ${{ needs.cuenta-movimiento-coverage-quality-gate.outputs.missed_lines }}
        shell: bash
        run: |
          status_label() {
