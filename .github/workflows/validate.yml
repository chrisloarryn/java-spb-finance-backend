      - name: Run account-transaction unit and integration tests excluding Karate
        id: run-tests
        continue-on-error: true
        working-directory: account-transaction
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode clean test -DexcludedGroups=karate 2>&1 | tee target/unit-tests.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish account-transaction unit summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py unit \
            --module-label "account-transaction" \
            --reports-dir account-transaction/target/surefire-reports \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload account-transaction unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-transaction-unit-test-report
          path: |
            account-transaction/target/surefire-reports
            account-transaction/target/unit-tests.log
          if-no-files-found: ignore

      - name: Fail if account-transaction unit tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  account-transaction-karate-contract-tests:
    runs-on: ubuntu-latest
    needs: account-transaction-unit-tests
    outputs:
      features_total: ${{ steps.publish-summary.outputs.features_total }}
      features_passed: ${{ steps.publish-summary.outputs.features_passed }}
      features_failed: ${{ steps.publish-summary.outputs.features_failed }}
      scenarios_total: ${{ steps.publish-summary.outputs.scenarios_total }}
      scenarios_passed: ${{ steps.publish-summary.outputs.scenarios_passed }}
      scenarios_failed: ${{ steps.publish-summary.outputs.scenarios_failed }}
      elapsed_seconds: ${{ steps.publish-summary.outputs.elapsed_seconds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run account-transaction Karate contract tests
        id: run-tests
        continue-on-error: true
        working-directory: account-transaction
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Dtest=karate.ApiContractsKarateTest test 2>&1 | tee target/karate-console.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish account-transaction Karate summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py karate \
            --module-label "account-transaction" \
            --summary-json account-transaction/target/karate-reports/karate-summary-json.txt \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload account-transaction Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-transaction-karate-report
          path: |
            account-transaction/target/karate-reports
            account-transaction/target/karate-console.log
          if-no-files-found: ignore

      - name: Fail if account-transaction Karate tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  account-transaction-gatling-performance-tests:
    runs-on: ubuntu-latest
    needs: account-transaction-unit-tests
    outputs:
      requests_total: ${{ steps.publish-summary.outputs.requests_total }}
      requests_ok: ${{ steps.publish-summary.outputs.requests_ok }}
      requests_ko: ${{ steps.publish-summary.outputs.requests_ko }}
      mean_response_ms: ${{ steps.publish-summary.outputs.mean_response_ms }}
      p95_ms: ${{ steps.publish-summary.outputs.p95_ms }}
      p99_ms: ${{ steps.publish-summary.outputs.p99_ms }}
      throughput_rps: ${{ steps.publish-summary.outputs.throughput_rps }}
      assertions_total: ${{ steps.publish-summary.outputs.assertions_total }}
      assertions_failed: ${{ steps.publish-summary.outputs.assertions_failed }}
      report_path: ${{ steps.publish-summary.outputs.report_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run account-transaction Gatling performance tests
        id: run-tests
        continue-on-error: true
        working-directory: account-transaction
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Pgatling verify -DskipTests=true 2>&1 | tee target/gatling-console.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish account-transaction Gatling summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py gatling \
            --module-label "account-transaction" \
            --console-log account-transaction/target/gatling-console.log \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload account-transaction Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-transaction-gatling-report
          path: |
            account-transaction/target/gatling
            account-transaction/target/gatling-console.log
          if-no-files-found: ignore

      - name: Fail if account-transaction Gatling tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  account-transaction-coverage-quality-gate:
    runs-on: ubuntu-latest
    needs: account-transaction-unit-tests
    outputs:
      line_coverage_pct: ${{ steps.publish-summary.outputs.line_coverage_pct }}
      covered_lines: ${{ steps.publish-summary.outputs.covered_lines }}
      missed_lines: ${{ steps.publish-summary.outputs.missed_lines }}
      coverage_threshold_pct: ${{ steps.publish-summary.outputs.coverage_threshold_pct }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run account-transaction coverage quality gate
        id: run-tests
        continue-on-error: true
        working-directory: account-transaction
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode -Pcoverage verify -DexcludedGroups=karate 2>&1 | tee target/coverage.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Publish account-transaction coverage summary
        id: publish-summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py coverage \
            --module-label "account-transaction" \
            --report-xml account-transaction/target/site/jacoco/jacoco.xml \
            --minimum-ratio 0.90 \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file "$GITHUB_OUTPUT"

      - name: Upload account-transaction coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-transaction-coverage-report
          path: |
            account-transaction/target/site/jacoco
            account-transaction/target/coverage.log
          if-no-files-found: ignore

      - name: Fail if account-transaction coverage gate failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  validation-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - client-person-unit-tests
      - client-person-karate-contract-tests
      - client-person-gatling-performance-tests
      - client-person-coverage-quality-gate
      - account-transaction-unit-tests
      - account-transaction-karate-contract-tests
      - account-transaction-gatling-performance-tests
      - account-transaction-coverage-quality-gate
    steps:
      - name: Publish workflow summary
        env:
          CLIENT_PERSON_UNIT_RESULT: ${{ needs.client-person-unit-tests.result }}
          CLIENT_PERSON_UNIT_TESTS_RUN: ${{ needs.client-person-unit-tests.outputs.tests_run }}
          CLIENT_PERSON_UNIT_FAILURES: ${{ needs.client-person-unit-tests.outputs.failures }}
          CLIENT_PERSON_UNIT_ERRORS: ${{ needs.client-person-unit-tests.outputs.errors }}
          CLIENT_PERSON_UNIT_SKIPPED: ${{ needs.client-person-unit-tests.outputs.skipped }}
          CLIENT_PERSON_UNIT_SERVICE_TESTS: ${{ needs.client-person-unit-tests.outputs.service_tests }}
          CLIENT_PERSON_UNIT_SECURITY_TESTS: ${{ needs.client-person-unit-tests.outputs.security_tests }}
          CLIENT_PERSON_UNIT_REPOSITORY_TESTS: ${{ needs.client-person-unit-tests.outputs.repository_tests }}
          CLIENT_PERSON_UNIT_INTEGRATION_TESTS: ${{ needs.client-person-unit-tests.outputs.integration_tests }}
          CLIENT_PERSON_UNIT_ERROR_TESTS: ${{ needs.client-person-unit-tests.outputs.error_tests }}
          CLIENT_PERSON_UNIT_OTHER_TESTS: ${{ needs.client-person-unit-tests.outputs.other_tests }}
          CLIENT_PERSON_KARATE_RESULT: ${{ needs.client-person-karate-contract-tests.result }}
          CLIENT_PERSON_KARATE_FEATURES: ${{ needs.client-person-karate-contract-tests.outputs.features_total }}
          CLIENT_PERSON_KARATE_SCENARIOS: ${{ needs.client-person-karate-contract-tests.outputs.scenarios_total }}
          CLIENT_PERSON_KARATE_FAILED: ${{ needs.client-person-karate-contract-tests.outputs.scenarios_failed }}
          CLIENT_PERSON_GATLING_RESULT: ${{ needs.client-person-gatling-performance-tests.result }}
          CLIENT_PERSON_GATLING_REQUESTS: ${{ needs.client-person-gatling-performance-tests.outputs.requests_total }}
          CLIENT_PERSON_GATLING_KO: ${{ needs.client-person-gatling-performance-tests.outputs.requests_ko }}
          CLIENT_PERSON_GATLING_P95: ${{ needs.client-person-gatling-performance-tests.outputs.p95_ms }}
          CLIENT_PERSON_GATLING_P99: ${{ needs.client-person-gatling-performance-tests.outputs.p99_ms }}
          CLIENT_PERSON_GATLING_THROUGHPUT: ${{ needs.client-person-gatling-performance-tests.outputs.throughput_rps }}
          CLIENT_PERSON_GATLING_ASSERTIONS_FAILED: ${{ needs.client-person-gatling-performance-tests.outputs.assertions_failed }}
          CLIENT_PERSON_COVERAGE_RESULT: ${{ needs.client-person-coverage-quality-gate.result }}
          CLIENT_PERSON_COVERAGE_PCT: ${{ needs.client-person-coverage-quality-gate.outputs.line_coverage_pct }}
          CLIENT_PERSON_COVERAGE_THRESHOLD_PCT: ${{ needs.client-person-coverage-quality-gate.outputs.coverage_threshold_pct }}
          CLIENT_PERSON_COVERAGE_COVERED_LINES: ${{ needs.client-person-coverage-quality-gate.outputs.covered_lines }}
          CLIENT_PERSON_COVERAGE_MISSED_LINES: ${{ needs.client-person-coverage-quality-gate.outputs.missed_lines }}
          ACCOUNT_TRANSACTION_UNIT_RESULT: ${{ needs.account-transaction-unit-tests.result }}
          ACCOUNT_TRANSACTION_UNIT_TESTS_RUN: ${{ needs.account-transaction-unit-tests.outputs.tests_run }}
          ACCOUNT_TRANSACTION_UNIT_FAILURES: ${{ needs.account-transaction-unit-tests.outputs.failures }}
          ACCOUNT_TRANSACTION_UNIT_ERRORS: ${{ needs.account-transaction-unit-tests.outputs.errors }}
          ACCOUNT_TRANSACTION_UNIT_SKIPPED: ${{ needs.account-transaction-unit-tests.outputs.skipped }}
          ACCOUNT_TRANSACTION_UNIT_SERVICE_TESTS: ${{ needs.account-transaction-unit-tests.outputs.service_tests }}
          ACCOUNT_TRANSACTION_UNIT_SECURITY_TESTS: ${{ needs.account-transaction-unit-tests.outputs.security_tests }}
          ACCOUNT_TRANSACTION_UNIT_REPOSITORY_TESTS: ${{ needs.account-transaction-unit-tests.outputs.repository_tests }}
          ACCOUNT_TRANSACTION_UNIT_INTEGRATION_TESTS: ${{ needs.account-transaction-unit-tests.outputs.integration_tests }}
          ACCOUNT_TRANSACTION_UNIT_ERROR_TESTS: ${{ needs.account-transaction-unit-tests.outputs.error_tests }}
          ACCOUNT_TRANSACTION_UNIT_OTHER_TESTS: ${{ needs.account-transaction-unit-tests.outputs.other_tests }}
          ACCOUNT_TRANSACTION_KARATE_RESULT: ${{ needs.account-transaction-karate-contract-tests.result }}
          ACCOUNT_TRANSACTION_KARATE_FEATURES: ${{ needs.account-transaction-karate-contract-tests.outputs.features_total }}
          ACCOUNT_TRANSACTION_KARATE_SCENARIOS: ${{ needs.account-transaction-karate-contract-tests.outputs.scenarios_total }}
          ACCOUNT_TRANSACTION_KARATE_FAILED: ${{ needs.account-transaction-karate-contract-tests.outputs.scenarios_failed }}
          ACCOUNT_TRANSACTION_GATLING_RESULT: ${{ needs.account-transaction-gatling-performance-tests.result }}
          ACCOUNT_TRANSACTION_GATLING_REQUESTS: ${{ needs.account-transaction-gatling-performance-tests.outputs.requests_total }}
          ACCOUNT_TRANSACTION_GATLING_KO: ${{ needs.account-transaction-gatling-performance-tests.outputs.requests_ko }}
          ACCOUNT_TRANSACTION_GATLING_P95: ${{ needs.account-transaction-gatling-performance-tests.outputs.p95_ms }}
          ACCOUNT_TRANSACTION_GATLING_P99: ${{ needs.account-transaction-gatling-performance-tests.outputs.p99_ms }}
          ACCOUNT_TRANSACTION_GATLING_THROUGHPUT: ${{ needs.account-transaction-gatling-performance-tests.outputs.throughput_rps }}
          ACCOUNT_TRANSACTION_GATLING_ASSERTIONS_FAILED: ${{ needs.account-transaction-gatling-performance-tests.outputs.assertions_failed }}
          ACCOUNT_TRANSACTION_COVERAGE_RESULT: ${{ needs.account-transaction-coverage-quality-gate.result }}
          ACCOUNT_TRANSACTION_COVERAGE_PCT: ${{ needs.account-transaction-coverage-quality-gate.outputs.line_coverage_pct }}
          ACCOUNT_TRANSACTION_COVERAGE_THRESHOLD_PCT: ${{ needs.account-transaction-coverage-quality-gate.outputs.coverage_threshold_pct }}
          ACCOUNT_TRANSACTION_COVERAGE_COVERED_LINES: ${{ needs.account-transaction-coverage-quality-gate.outputs.covered_lines }}
          ACCOUNT_TRANSACTION_COVERAGE_MISSED_LINES: ${{ needs.account-transaction-coverage-quality-gate.outputs.missed_lines }}
        shell: bash
        run: |
          status_label() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              skipped) echo "SKIPPED" ;;
              cancelled) echo "CANCELLED" ;;
              *) echo "UNKNOWN" ;;
            esac
          }

          {
            echo "## Validation Summary"
            echo ""
            echo "| Module | Stage | Result | Highlights |"
            echo "| --- | --- | --- | --- |"
            echo "| client-person | Unit and integration | $(status_label "${CLIENT_PERSON_UNIT_RESULT}") | tests=${CLIENT_PERSON_UNIT_TESTS_RUN:-n/a}, failures=${CLIENT_PERSON_UNIT_FAILURES:-n/a}, errors=${CLIENT_PERSON_UNIT_ERRORS:-n/a}, skipped=${CLIENT_PERSON_UNIT_SKIPPED:-n/a}, svc=${CLIENT_PERSON_UNIT_SERVICE_TESTS:-n/a}, sec=${CLIENT_PERSON_UNIT_SECURITY_TESTS:-n/a}, repo=${CLIENT_PERSON_UNIT_REPOSITORY_TESTS:-n/a}, api=${CLIENT_PERSON_UNIT_INTEGRATION_TESTS:-n/a}, err=${CLIENT_PERSON_UNIT_ERROR_TESTS:-n/a}, other=${CLIENT_PERSON_UNIT_OTHER_TESTS:-n/a} |"
