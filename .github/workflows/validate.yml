          CLIENTE_PERSONA_KARATE_SCENARIOS: ${{ needs.cliente-persona-karate-contract-tests.outputs.scenarios_total }}
          CLIENTE_PERSONA_KARATE_FAILED: ${{ needs.cliente-persona-karate-contract-tests.outputs.scenarios_failed }}
